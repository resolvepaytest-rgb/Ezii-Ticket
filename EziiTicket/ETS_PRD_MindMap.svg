<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .card { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.14); stroke-width: 1.2; }
      .card2 { fill: rgba(79,142,247,0.10); stroke: rgba(79,142,247,0.35); stroke-width: 1.2; }
      .title { font: 700 22px system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #f5f7ff; }
      .h { font: 700 16px system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #f5f7ff; }
      .t { font: 500 13px system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: rgba(245,247,255,0.86); }
      .mut { fill: rgba(245,247,255,0.62); }
      .link { stroke: rgba(255,255,255,0.22); stroke-width: 2; fill: none; }
      .link2 { stroke: rgba(79,142,247,0.55); stroke-width: 2.2; fill: none; }
      .dot { fill: rgba(79,142,247,0.95); }
      .pill { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.14); stroke-width: 1; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1100"/>

  <!-- Center node -->
  <g filter="url(#shadow)">
    <rect class="card2" x="730" y="500" width="340" height="120" rx="18"/>
    <text class="title" x="900" y="545" text-anchor="middle">EZII Ticketing System (ETS)</text>
    <text class="t mut" x="900" y="575" text-anchor="middle">PRD v1.0 " March 2026</text>
    <g>
      <rect class="pill" x="780" y="590" width="240" height="28" rx="14"/>
      <text class="t" x="900" y="610" text-anchor="middle">Payroll � Leave � Attendance � Expense</text>
    </g>
  </g>

  <!-- Left: Personas & Roles -->
  <path class="link2" d="M730 560 C 610 560, 520 520, 410 460"/>
  <circle class="dot" cx="730" cy="560" r="4"/>
  <g filter="url(#shadow)">
    <rect class="card" x="110" y="340" width="360" height="250" rx="16"/>
    <text class="h" x="140" y="380">Personas &amp; RBAC</text>
    <text class="t" x="140" y="410">- Customer (own tickets)</text>
    <text class="t" x="140" y="432">- Org Admin (org tickets)</text>
    <text class="t" x="140" y="454">- L1 Agent (triage/resolve)</text>
    <text class="t" x="140" y="476">- L2 Specialist (escalations)</text>
    <text class="t" x="140" y="498">- L3 Engineer (bugs/incidents)</text>
    <text class="t" x="140" y="520">- Team Lead (visibility/control)</text>
    <text class="t" x="140" y="542">- System Admin (config + full access)</text>
  </g>

  <!-- Left-bottom: Ticket lifecycle -->
  <path class="link" d="M730 600 C 590 690, 520 750, 410 820"/>
  <circle class="dot" cx="730" cy="600" r="4"/>
  <g filter="url(#shadow)">
    <rect class="card" x="110" y="720" width="420" height="260" rx="16"/>
    <text class="h" x="140" y="760">Ticket lifecycle</text>
    <text class="t" x="140" y="792">Statuses: New ? Open ? Pending ? Escalated</text>
    <text class="t" x="140" y="814">? Resolved ? Closed</text>
    <text class="t" x="140" y="846">Other: Cancelled, Reopened</text>
    <text class="t" x="140" y="878">Rules:</text>
    <text class="t" x="160" y="900">- Tier timers pause in Pending</text>
    <text class="t" x="160" y="922">- Closed auto after 7 days (reopen window)</text>
    <text class="t" x="160" y="944">- Escalation requires structured handoff note</text>
  </g>

  <!-- Top: System setup & configuration -->
  <path class="link" d="M900 500 C 900 420, 900 360, 900 260"/>
  <circle class="dot" cx="900" cy="500" r="4"/>
  <g filter="url(#shadow)">
    <rect class="card" x="640" y="70" width="520" height="290" rx="16"/>
    <text class="h" x="670" y="110">System setup &amp; configuration</text>
    <text class="t" x="670" y="142">Organization profile:</text>
    <text class="t" x="690" y="164">- Name, logo, timezone, support email</text>
    <text class="t" x="690" y="186">- Business hours + holiday calendar</text>
    <text class="t" x="690" y="208">- Portal subdomain (support.ezii.com/org)</text>
    <text class="t" x="670" y="240">Product enablement:</text>
    <text class="t" x="690" y="262">- Enable/disable products + prefixes (PAY/LEA/ATT/EXP)</text>
    <text class="t" x="670" y="294">Categories:</text>
    <text class="t" x="690" y="316">- Default category trees; admin can add/rename/disable</text>
  </g>

  <!-- Right: Channels -->
  <path class="link2" d="M1070 560 C 1210 560, 1330 520, 1450 460"/>
  <circle class="dot" cx="1070" cy="560" r="4"/>
  <g filter="url(#shadow)">
    <rect class="card" x="1260" y="320" width="470" height="290" rx="16"/>
    <text class="h" x="1290" y="360">Channels</text>
    <text class="t" x="1290" y="392">1) Chat Widget (primary)</text>
    <text class="t" x="1310" y="414">- Floating FAB, badge = open tickets</text>
    <text class="t" x="1310" y="436">- Guided ticket creation + attachments</text>
    <text class="t" x="1310" y="458">- Draft autosave (10s), restore, discard confirm</text>
    <text class="t" x="1310" y="480">- Context metadata attached (screen state)</text>
    <text class="t" x="1290" y="512">2) Self-service portal</text>
    <text class="t" x="1310" y="534">- Track tickets, conversation, filters, CSAT</text>
    <text class="t" x="1290" y="566">3) Email-to-ticket</text>
    <text class="t" x="1310" y="588">- Inbound per product; replies thread into ticket</text>
  </g>

  <!-- Right-bottom: SLA & escalation -->
  <path class="link" d="M1070 600 C 1210 700, 1320 760, 1440 830"/>
  <circle class="dot" cx="1070" cy="600" r="4"/>
  <g filter="url(#shadow)">
    <rect class="card" x="1230" y="720" width="530" height="260" rx="16"/>
    <text class="h" x="1260" y="760">SLA engine &amp; escalation</text>
    <text class="t" x="1260" y="792">Two-tier model:</text>
    <text class="t" x="1280" y="814">- Tier 1 (customer-facing, configurable within bounds)</text>
    <text class="t" x="1280" y="836">- Tier 2 (internal L2/L3, hard-coded; not visible)</text>
    <text class="t" x="1260" y="868">Rules:</text>
    <text class="t" x="1280" y="890">- Warning at 75% elapsed</text>
    <text class="t" x="1280" y="912">- Tier 1 breach may auto-escalate + notify</text>
    <text class="t" x="1280" y="934">- Keyword P1 auto-escalation on create</text>
  </g>

  <!-- Bottom: Notifications, Audit, Reports -->
  <path class="link" d="M900 620 C 900 700, 900 760, 900 850"/>
  <circle class="dot" cx="900" cy="620" r="4"/>
  <g filter="url(#shadow)">
    <rect class="card" x="650" y="750" width="520" height="250" rx="16"/>
    <text class="h" x="680" y="790">Operations layer</text>
    <text class="t" x="680" y="822">Notifications:</text>
    <text class="t" x="700" y="844">- Email + in-app on lifecycle + SLA events</text>
    <text class="t" x="680" y="876">Audit &amp; compliance:</text>
    <text class="t" x="700" y="898">- Immutable ticket audit trail + admin audit log</text>
    <text class="t" x="680" y="930">Dashboards &amp; reports:</text>
    <text class="t" x="700" y="952">- Agent / Lead / Exec dashboards, scheduled reports</text>
  </g>

  <!-- Small note: NFR -->
  <g filter="url(#shadow)">
    <rect class="card" x="640" y="390" width="520" height="90" rx="16"/>
    <text class="h" x="670" y="425">Non-functional requirements (highlights)</text>
    <text class="t" x="670" y="450">Perf (&lt;2s loads), multi-tenant isolation, 5M tickets, TLS+AES, WCAG AA, DPDP compliance</text>
  </g>

  <!-- Legend -->
  <g>
    <rect class="pill" x="20" y="20" width="310" height="34" rx="17"/>
    <circle class="dot" cx="45" cy="37" r="5"/>
    <text class="t" x="62" y="41">Mind map summary of PRD modules</text>
  </g>
</svg>
